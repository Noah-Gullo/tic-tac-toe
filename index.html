<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link href="style.css" rel="stylesheet">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <script src="script.js" defer></script>
        <title>Tic-Tac-Toe</title>
    </head>

    <body>
        <h1> Tic-Tac-Toe </h1>
        
        <div id="button-wrapper"></div>
        <div id="text-wrapper"></div>
        <div id="flex-wrapper">
            <div id="board-grid"></div>         
        </div>

        <dialog id="name-popup">
            <table>
                <tr>
                    <td>
                        <input id="p1-name-change" type="text" placeholder="Enter first name"></input>
                    </td>
                </tr>

                <tr>
                    <td>
                        <input id="p2-name-change" type="text" placeholder="Enter second name"></input>
                    </td>
                </tr>

                <tr>
                    <td>
                        <button id="submit-button" type="submit">Save</button>
                    </td>
                </tr>
            </table>
        </dialog>
    </body>
</html>
